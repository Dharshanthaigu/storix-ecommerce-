name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
defaults:
  run:
    working-directory: storix-backend
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: storix-backend/package-lock.json
      - run: npm ci
      - run: npm test
        env:
          JWT_SECRET: test_secret_for_ci
          RAZORPAY_WEBHOOK_SECRET: test_webhook_secret_for_ci
          RAZORPAY_KEY_ID: rzp_test_dummy_key_for_ci
          RAZORPAY_KEY_SECRET: dummy_secret_for_ci
      - run: npm run build