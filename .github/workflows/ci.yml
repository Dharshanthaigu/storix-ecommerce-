name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: test_secret_for_ci
          RAZORPAY_WEBHOOK_SECRET: test_webhook_secret_for_ci
          RAZORPAY_KEY_ID: rzp_test_dummy_key_for_ci
          RAZORPAY_KEY_SECRET: dummy_secret_for_ci

      - name: Build TypeScript
        run: npm run build